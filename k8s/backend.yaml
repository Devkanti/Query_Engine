apiVersion: apps/v1
kind: Deployment
metadata:
  name: aqp-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aqp-backend
  template:
    metadata:
      labels:
        app: aqp-backend
    spec:
      containers:
      - name: backend
        image: aqp-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: aqp-backend-svc
spec:
  type: NodePort
  selector:
    app: aqp-backend
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
