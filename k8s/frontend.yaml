apiVersion: apps/v1
kind: Deployment
metadata:
  name: aqp-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aqp-frontend
  template:
    metadata:
      labels:
        app: aqp-frontend
    spec:
      containers:
      - name: frontend
        image: aqp-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: aqp-frontend-svc
spec:
  type: NodePort
  selector:
    app: aqp-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30081
